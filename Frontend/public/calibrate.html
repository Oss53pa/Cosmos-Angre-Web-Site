<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Calibration Plan Cosmos</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #222; overflow: auto; font-family: monospace; }
#info { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.85); color: #0f0; padding: 10px 16px; z-index: 10; font-size: 14px; border-radius: 4px; }
#container { position: relative; display: inline-block; }
#container img { display: block; }
#crosshair { position: fixed; pointer-events: none; z-index: 5; }
#crosshairH, #crosshairV { position: fixed; background: rgba(0,255,0,0.4); pointer-events: none; z-index: 5; }
#crosshairH { height: 1px; width: 100%; left: 0; }
#crosshairV { width: 1px; height: 100%; top: 0; }
.marker { position: absolute; width: 8px; height: 8px; background: red; border: 1px solid #fff; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 3; }
.marker-label { position: absolute; color: #ff0; font-size: 11px; transform: translate(6px, -14px); white-space: nowrap; pointer-events: none; z-index: 3; }
#log { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.9); color: #0f0; padding: 8px; max-height: 200px; overflow-y: auto; font-size: 12px; z-index: 10; }
</style>
</head>
<body>
<div id="info">Survole l'image pour voir les coordonnées pixel. Clique pour marquer un point.</div>
<div id="crosshairH"></div>
<div id="crosshairV"></div>
<div id="container">
  <img src="/plan-cosmos.png" id="img">
</div>
<div id="log">Points cliqués :<br></div>
<script>
const img = document.getElementById('img');
const info = document.getElementById('info');
const log = document.getElementById('log');
const container = document.getElementById('container');
const crossH = document.getElementById('crosshairH');
const crossV = document.getElementById('crosshairV');
const points = [];

img.addEventListener('mousemove', (e) => {
  const rect = img.getBoundingClientRect();
  const scaleX = img.naturalWidth / rect.width;
  const scaleY = img.naturalHeight / rect.height;
  const px = Math.round((e.clientX - rect.left) * scaleX);
  const py = Math.round((e.clientY - rect.top) * scaleY);
  info.textContent = `Pixel: (${px}, ${py}) — Image: ${img.naturalWidth}×${img.naturalHeight}`;
  crossH.style.top = e.clientY + 'px';
  crossV.style.left = e.clientX + 'px';
});

img.addEventListener('click', (e) => {
  const rect = img.getBoundingClientRect();
  const scaleX = img.naturalWidth / rect.width;
  const scaleY = img.naturalHeight / rect.height;
  const px = Math.round((e.clientX - rect.left) * scaleX);
  const py = Math.round((e.clientY - rect.top) * scaleY);
  points.push({px, py});

  // Visual marker
  const marker = document.createElement('div');
  marker.className = 'marker';
  marker.style.left = (px / scaleX) + 'px';
  marker.style.top = (py / scaleY) + 'px';
  container.appendChild(marker);

  const label = document.createElement('div');
  label.className = 'marker-label';
  label.style.left = (px / scaleX) + 'px';
  label.style.top = (py / scaleY) + 'px';
  label.textContent = `#${points.length} (${px},${py})`;
  container.appendChild(label);

  log.innerHTML += `Point #${points.length}: (${px}, ${py})<br>`;
  log.scrollTop = log.scrollHeight;
});
</script>
</body>
</html>
