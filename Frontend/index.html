<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Performance hints -->
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="color-scheme" content="dark light" />

    <!-- Theme -->
    <meta name="theme-color" content="#24412C" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#F2EBDD" media="(prefers-color-scheme: light)" />
    <meta name="msapplication-TileColor" content="#24412C" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Cosmos" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#C9A961" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Préconnections critiques (Supabase) -->
    <link rel="preconnect" href="https://placeholder.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://placeholder.supabase.co" />

    <!-- Default meta (overrides via react-helmet-async par page) -->
    <title>Cosmos Angré · Le meilleur du quotidien, ici</title>
    <meta
      name="description"
      content="Cosmos Angré, le centre de vie d'Angré (Cocody, Abidjan). Enseignes, restaurants & cafés, agenda, Cosmos Club, services et Retail Park. Tout ce qui fait vos journées, au même endroit."
    />
    <meta name="author" content="New Heaven SA" />
    <meta name="generator" content="Vite + React" />

    <!-- Open Graph defaults -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Cosmos Angré · Le meilleur du quotidien, ici" />
    <meta property="og:description" content="Le centre de vie d'Angré, Cocody, Abidjan." />
    <meta property="og:image" content="/og-image.jpg" />
    <meta property="og:site_name" content="Cosmos Angré" />
    <meta property="og:locale" content="fr_FR" />
    <meta property="og:locale:alternate" content="en_US" />

    <!-- Twitter defaults -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Cosmos Angré" />
    <meta name="twitter:description" content="Le centre de vie d'Angré, Cocody, Abidjan." />
    <meta name="twitter:image" content="/og-image.jpg" />

    <!-- Liens RSS / Sitemap -->
    <link rel="alternate" type="application/rss+xml" title="Cosmos Angré — Magazine" href="/feed.xml" />
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />
  </head>
  <body class="bg-cosmos-night">
    <noscript>
      <div style="padding: 2rem; text-align: center; font-family: sans-serif;">
        Cosmos Angré nécessite JavaScript activé pour fonctionner.
        <br />
        Cosmos Angré requires JavaScript to run.
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
